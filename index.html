<!DOCTYPE html>
<html lang="bg">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EvoGenesis: Idle Clicker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <!-- Горна част: Ресурси и Етап -->
        <header class="top-bar">
            <div class="evolution-info">
                <h2>Етап: <span id="stage-name">Едноклетъчно</span></h2>
            </div>
            <div class="resources">
                <div class="resource-box a-theme">
                    <span class="res-label">Аденин (A)</span>
                    <span class="res-value" id="res-A">0</span>
                </div>
                <div class="resource-box t-theme">
                    <span class="res-label">Тимин (T)</span>
                    <span class="res-value" id="res-T">0</span>
                </div>
                <div class="resource-box g-theme">
                    <span class="res-label">Гуанин (G)</span>
                    <span class="res-value" id="res-G">0</span>
                </div>
                <div class="resource-box c-theme">
                    <span class="res-label">Цитозин (C)</span>
                    <span class="res-value" id="res-C">0</span>
                </div>
            </div>
        </header>

        <main class="game-area">
            <!-- Лява част: Кликър (ДНК) -->
            <section class="clicker-panel">
                <button id="dna-btn" class="dna-button">🧬</button>
                <div class="stats">
                    <p>Добив при клик: <strong id="stat-click">1.0</strong> на база</p>
                    <p>Пасивен доход: <strong id="stat-bps">0.0</strong> на база/сек</p>
                    <p>Глобален множител: <strong id="stat-mult">x1.00</strong></p>
                </div>
            </section>

            <!-- Дясна част: Магазин / Ъпгрейди -->
            <aside class="store-panel">
                <h3>Еволюционен магазин</h3>
                <div class="upgrades">

                    <!-- A-Upgrade -->
                    <button id="upg-A" class="upgrade-btn a-theme">
                        <div class="upg-header">Сила на клика (A)</div>
                        <div class="upg-desc">Увеличава базовия добив при ръчен клик.</div>
                        <div class="upg-meta">
                            <span>Ниво: <span id="lvl-A">0</span></span>
                            <span>Цена: <strong id="cost-A">10</strong> A</span>
                        </div>
                    </button>

                    <!-- T-Upgrade -->
                    <button id="upg-T" class="upgrade-btn t-theme">
                        <div class="upg-header">Авто-кликър (T)</div>
                        <div class="upg-desc">Генерира бази автоматично всяка секунда.</div>
                        <div class="upg-meta">
                            <span>Ниво: <span id="lvl-T">0</span></span>
                            <span>Цена: <strong id="cost-T">10</strong> T</span>
                        </div>
                    </button>

                    <!-- G-Upgrade -->
                    <button id="upg-G" class="upgrade-btn g-theme">
                        <div class="upg-header">Мултипликатор (G)</div>
                        <div class="upg-desc">+15% към цялото производство (кликове и пасивно).</div>
                        <div class="upg-meta">
                            <span>Ниво: <span id="lvl-G">0</span></span>
                            <span>Цена: <strong id="cost-G">15</strong> G</span>
                        </div>
                    </button>

                    <!-- C-Upgrade -->
                    <button id="upg-C" class="upgrade-btn c-theme">
                        <div class="upg-header">Еволюционен скок (C)</div>
                        <div class="upg-desc">Премини към следващия етап на живот!</div>
                        <div class="upg-meta">
                            <span id="c-status">Следващ етап</span>
                            <span>Цена: <strong id="cost-C">50</strong> C</span>
                        </div>
                    </button>

                </div>
            </aside>
        </main>

        <footer>
            <button id="reset-btn" class="reset-button">Изтрий запазената игра</button>
        </footer>
    </div>

    <script src="script.js"></script>
</body>

</html>
